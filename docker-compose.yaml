services:
  registry:
    image: registry:3.0.0
    volumes:
      - registry_data:/var/lib/registry
    networks:
      - registry_network
    expose:
      - "5000"

  nginx:
    image: nginx:1.29.7
    volumes:
      - ./nginx/conf.d/:/etc/nginx/conf.d/
      - ./nginx/ssl/:/etc/nginx/ssl/
    networks:
      - registry_network
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - registry

volumes:
  registry_data:

networks:
  registry_network:
    driver: bridge
