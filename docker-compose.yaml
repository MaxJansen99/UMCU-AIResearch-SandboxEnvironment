services:
  registry:
    image: registry:3.0.0
    volumes:
      - ./registry/config.yaml:/etc/distribution/config.yml:ro
      - registry_data:/var/lib/registry
    networks:
      - registry_network
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5000/v2/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:1.29.7
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/auth:/etc/nginx/auth
    networks:
      - registry_network
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      registry:
        condition: service_healthy

  docker-manager:
    build: ./DockerManager
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./DockerManager:/app
    networks:
      - registry_network
    expose:
      - "8000"
    depends_on:
      - registry

volumes:
  registry_data:

networks:
  registry_network:
    driver: bridge
