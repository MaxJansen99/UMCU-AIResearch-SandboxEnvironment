<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UMC DICOM Query Tool</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="main-grid">
      <section class="panel">
        <p class="eyebrow">Basis filters</p>
        <h1>DICOM query tool</h1>

        <form id="query-form">
          <div class="field">
            <label for="basic-modality">Modality</label>
            <select id="basic-modality"></select>
          </div>

          <div class="field">
            <label for="basic-region">Regio</label>
            <select id="basic-region"></select>
          </div>

          <div class="field date-grid">
            <div>
              <label for="date-from">Datum van</label>
              <input id="date-from" type="date">
            </div>
            <div>
              <label for="date-to">Datum tot</label>
              <input id="date-to" type="date">
            </div>
          </div>

          <div class="form-actions">
            <button class="primary-button" type="submit">Zoeken</button>
          </div>

          <details class="advanced-panel">
            <summary>Geavanceerd</summary>
            <div class="advanced-body">
              <button id="add-filter" class="secondary-button" type="button">Filter toevoegen</button>
              <div id="filter-list" class="filter-list"></div>
              <label class="checkbox">
                <input id="recursive" type="checkbox" checked>
                Recursief zoeken
              </label>
            </div>
          </details>
        </form>
      </section>

      <section class="panel">
        <p class="eyebrow">Resultaten</p>
        <h2>Overzicht</h2>

        <div class="summary-grid">
          <article><span>Studies</span><strong id="kpi-studies">-</strong></article>
          <article><span>Series</span><strong id="kpi-series">-</strong></article>
          <article><span>Images</span><strong id="kpi-images">-</strong></article>
        </div>

        <div id="matches-body" class="match-study-list">
          <p class="muted">Nog geen query uitgevoerd.</p>
        </div>
      </section>
    </section>
  </main>

  <template id="filter-template">
    <div class="filter-row">
      <select class="filter-tag"></select>
      <select class="filter-operator"></select>
      <input class="filter-value" type="text" placeholder="waarde">
      <button class="secondary-button remove-filter" type="button">Verwijderen</button>
    </div>
  </template>

  <script src="/assets/app.js" defer></script>
</body>
</html>
