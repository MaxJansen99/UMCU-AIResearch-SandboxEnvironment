services:
  orthanc:
    image: jodogne/orthanc-plugins:latest
    container_name: orthanc
    ports:
      - "8042:8042"
    environment:
      ORTHANC__REGISTERED_USERS: "orthanc:orthanc"
      ORTHANC__AUTHENTICATION_ENABLED: "true"
    volumes:
      - orthanc-db:/var/lib/orthanc/db
      - orthanc-config:/etc/orthanc
      - ./idc-data:/data:ro
    networks:
      - dicom-net

  dicom-query:
    build:
      context: ./query
      dockerfile: Dockerfile
    container_name: dicom-query
    ports:
      - "8000:8000"
    environment:
      QUERY_PORT: "8000"
      QUERY_TLS: "true"
      QUERY_HOST: "0.0.0.0"
      QUERY_TLS_CERT: /certs/server.crt
      QUERY_TLS_KEY: /certs/server.key
      QUERY_PACS_URL: "http://orthanc:8042"
      QUERY_PACS_USER: "orthanc"
      QUERY_PACS_PASSWORD: "orthanc"
    volumes:
      - ./idc-data:/data:ro
      - query_certs:/certs
    networks:
      - dicom-net
    depends_on:
      orthanc:
        condition: service_started
      dicom-importer:
        condition: service_completed_successfully

  dicom-datamanager:
    build:
      context: ./datamanager
      dockerfile: Dockerfile
    container_name: dicom-datamanager
    ports:
      - "8001:8001"
    environment:
      DATAMANAGER_PORT: "8001"
      DATAMANAGER_HOST: "0.0.0.0"
      DATAMANAGER_PACS_URL: "http://orthanc:8042"
      DATAMANAGER_PACS_USER: "orthanc"
      DATAMANAGER_PACS_PASSWORD: "orthanc"
      DEPERSONALIZED_ROOT: "/depersonalized"
      RECORDS_FILE: "/depersonalized/records.json"
      SMTP_SERVER: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
    volumes:
      - ./depersonalized_data:/depersonalized:rw
    networks:
      - dicom-net
    depends_on:
      orthanc:
        condition: service_started

  dicom-importer:
    image: python:3.11-slim
    container_name: dicom-importer
    working_dir: /app
    environment:
      PACS_URL: "http://orthanc:8042"
      DATA_DIR: /data
      PACS_USER: "orthanc"
      PACS_PASSWORD: "orthanc"
    volumes:
      - ./idc-data:/data:ro
      - ./query/import_helper.py:/app/import_helper.py
    networks:
      - dicom-net
    depends_on:
      - orthanc
    entrypoint: ["sh", "-c", "pip install -q requests && python /app/import_helper.py"]
    restart: "no"

volumes:
  query_certs:
  orthanc-db:
  orthanc-config:

networks:
  dicom-net:
    driver: bridge