services:
  orthanc:
    image: jodogne/orthanc-plugins:latest
    container_name: orthanc
    ports:
      - "8042:8042"
    environment:
      ORTHANC__REGISTERED_USERS: "orthanc:orthanc"
      ORTHANC__AUTHENTICATION_ENABLED: "true"
    volumes:
      - orthanc-db:/var/lib/orthanc/db
      - orthanc-config:/etc/orthanc
      - ./idc-data:/data:ro
    networks:
      - dicom-net

  dicom-query:
    build:
      context: ./query
      dockerfile: Dockerfile
    container_name: dicom-query
    ports:
      - "8000:8000"
    environment:
      QUERY_PORT: "8000"
      QUERY_TLS: "false"
      QUERY_HOST: "0.0.0.0"
      QUERY_TLS_CERT: /certs/server.crt
      QUERY_TLS_KEY: /certs/server.key
      QUERY_PACS_URL: "http://orthanc:8042"
      QUERY_PACS_USER: "orthanc"
      QUERY_PACS_PASSWORD: "orthanc"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "dicom_query"
      DB_USER: "dicom_query"
      DB_PASSWORD: "dicom_query"
    volumes:
      - ./idc-data:/data:ro
      - query_certs:/certs
    networks:
      - dicom-net
    depends_on:
      orthanc:
        condition: service_started
      postgres:
        condition: service_healthy
      dicom-importer:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    container_name: dicom-postgres
    environment:
      POSTGRES_DB: "dicom_query"
      POSTGRES_USER: "dicom_query"
      POSTGRES_PASSWORD: "dicom_query"
    ports:
      - "5433:5432"
    volumes:
      - postgres-db:/var/lib/postgresql/data
    networks:
      - dicom-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dicom_query -d dicom_query"]
      interval: 5s
      timeout: 5s
      retries: 10

  dicom-importer:
    image: python:3.11-slim
    container_name: dicom-importer
    working_dir: /app
    environment:
      PACS_URL: "http://orthanc:8042"
      DATA_DIR: /data
      PACS_USER: "orthanc"
      PACS_PASSWORD: "orthanc"
    volumes:
      - ./idc-data:/data:ro
      - ./query/import_helper.py:/app/import_helper.py
    networks:
      - dicom-net
    depends_on:
      - orthanc
    entrypoint: ["sh", "-c", "pip install -q requests && python /app/import_helper.py"]
    restart: "no"

  test-client:
    image: curlimages/curl:latest
    container_name: test-client
    depends_on:
      - dicom-query
    networks:
      - dicom-net
    entrypoint: ["sh", "-c", "sleep 10 && curl http://dicom-query:8000/health && sleep 3600"]

volumes:
  query_certs:
  orthanc-db:
  orthanc-config:
  postgres-db:

networks:
  dicom-net:
    driver: bridge
