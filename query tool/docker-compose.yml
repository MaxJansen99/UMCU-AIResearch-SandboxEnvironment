services:
  idc-fetch:
    build:
      context: ./idc-fetch
      dockerfile: Dockerfile
    volumes:
      - ./idc-data:/data

  dicom-query:
    build:
      context: ./query
      dockerfile: Dockerfile
    container_name: dicom-query
    depends_on:
      idc-fetch:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      DICOM_ROOT: /data
      QUERY_PORT: "8000"
      QUERY_TLS: "false"
      QUERY_HOST: "0.0.0.0"
    volumes:
      - ./idc-data:/data:ro
    networks:
      - dicom-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dicom-net:
    driver: bridge
